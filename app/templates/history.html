<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>History – SmartQuery · AdventureWorks AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{--bg:#0a0a0a;--surface:#141414;--border:#222;--bstrong:#2e2e2e;--ink:#f0ece4;--ink2:#a8a29e;--ink3:#57534e;--accent:#e07b3a;--accentL:#f59c60;--green:#4ade80;--red:#f87171;--ibg:#0f0f0f;--chip:#0f0f0f;--chiphov:#160f06;--errb:#1c0d0d;--errbd:#3d1a1a;}
[data-theme="light"]{--bg:#f5f2ec;--surface:#ede9e1;--border:#d5d0c8;--bstrong:#b5afa7;--ink:#1a1714;--ink2:#4a4640;--ink3:#8a877d;--accent:#c45c1a;--accentL:#e07b3a;--green:#2d6a4f;--red:#9b2c2c;--ibg:#fff;--chip:#fff;--chiphov:#fef8f4;--errb:#fdf1f1;--errbd:#f0c0c0;}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}

body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.45;animation:gridDrift 20s linear infinite;pointer-events:none;}
[data-theme="light"] body::before{opacity:.18;}
body::after{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,transparent 40%,var(--bg) 100%);pointer-events:none;}
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.75;}
.topbar,.page-wrap,footer{position:relative;z-index:1;}

@keyframes gridDrift{0%{background-position:0 0}100%{background-position:48px 48px}}
@keyframes slideDown{from{transform:translateY(-110%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.65)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;animation:slideDown .55s cubic-bezier(.22,1,.36,1) both;transition:background .3s,border-color .3s;}
[data-theme="light"] .topbar{background:rgba(245,242,236,.88);}
.topbar::after{content:'';position:absolute;bottom:0;left:0;height:1.5px;width:0;background:linear-gradient(90deg,var(--accent),transparent);animation:lineGrow .8s cubic-bezier(.22,1,.36,1) .6s both;transform-origin:left;}
.topbar-left{display:flex;align-items:center;gap:22px;}
.topbar-right{display:flex;align-items:center;gap:18px;}
.wordmark{display:flex;align-items:center;gap:7px;text-decoration:none;}
.wm-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 2.5s ease-in-out 1s infinite;}
.wm-sq{font-size:17px;letter-spacing:-.3px;color:var(--ink);}
.wm-smart{font-weight:500;font-family:'Syne',sans-serif;}
.wm-query{font-weight:700;font-family:'Instrument Serif',serif;font-style:italic;}
.topbar-tag{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border);border-radius:3px;animation:fadeIn .6s ease .5s both;}
.db-pill{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:12px;color:var(--ink2);animation:fadeIn .6s ease .7s both;}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:blink 2.4s ease-in-out infinite;}
.nav-link{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border:1px solid var(--border);border-radius:3px;text-decoration:none;transition:border-color .2s,color .2s,background .2s;animation:fadeIn .6s ease .55s both;}
.nav-link:hover{border-color:var(--accent);color:var(--accent);background:var(--chiphov);}
.theme-toggle{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 5px 4px 10px;cursor:pointer;user-select:none;transition:border-color .2s,background .3s,transform .1s;animation:fadeIn .6s ease .9s both;}
.theme-toggle:hover{border-color:var(--accent);}
.theme-toggle:active{transform:scale(.95);}
.toggle-label{font-family:'DM Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);min-width:30px;}
.toggle-track{width:36px;height:20px;border-radius:99px;background:var(--bstrong);position:relative;transition:background .22s;flex-shrink:0;}
[data-theme="dark"] .toggle-track{background:var(--accent);}
.toggle-knob{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--bg);transition:transform .22s;box-shadow:0 1px 4px rgba(0,0,0,.4);}
[data-theme="dark"] .toggle-knob{transform:translateX(16px);}

/* ── PAGE ── */
.page-wrap{max-width:1000px;margin:0 auto;padding:52px 40px 120px;}

.page-header{margin-bottom:40px;animation:slideUp .65s cubic-bezier(.22,1,.36,1) .1s both;}
.page-eyebrow{font-family:'DM Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.page-eyebrow::before{content:'';display:inline-block;width:24px;height:1.5px;background:var(--accent);}
.page-title{font-family:'Instrument Serif',serif;font-size:clamp(32px,4vw,52px);font-weight:400;line-height:1.05;letter-spacing:-1.5px;color:var(--ink);margin-bottom:14px;}
.page-title em{font-style:italic;color:var(--accentL);}
.page-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.meta-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);}
.meta-count b{color:var(--ink2);}

/* Toolbar */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap;animation:slideUp .5s cubic-bezier(.22,1,.36,1) .2s both;}
.search-box{flex:1;min-width:200px;padding:9px 14px;font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);background:var(--ibg);border:1.5px solid var(--border);border-radius:6px;outline:none;transition:border-color .2s,box-shadow .2s;}
.search-box:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(224,123,58,.1);}
.search-box::placeholder{color:var(--ink3);}
.btn-clear-all{padding:9px 16px;font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;color:var(--red);background:transparent;border:1.5px solid var(--errbd);border-radius:6px;cursor:pointer;transition:background .2s,border-color .2s,transform .1s;white-space:nowrap;}
.btn-clear-all:hover{background:var(--errb);border-color:var(--red);transform:scale(.97);}

/* Filter tabs */
.filter-tabs{display:flex;gap:6px;margin-bottom:24px;animation:slideUp .5s cubic-bezier(.22,1,.36,1) .25s both;}
.filter-tab{padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);background:var(--ibg);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:border-color .18s,color .18s,background .18s;}
.filter-tab:hover{border-color:var(--accent);color:var(--accent);}
.filter-tab.active{border-color:var(--accent);color:var(--accent);background:var(--chiphov);}

/* History list */
.history-list{display:flex;flex-direction:column;gap:10px;}

.history-card{
  background:var(--ibg);border:1.5px solid var(--border);border-radius:8px;
  overflow:hidden;transition:border-color .2s;
  animation:rowIn .35s ease both;
}
.history-card:hover{border-color:var(--bstrong);}
.history-card.status-error{border-left:3px solid var(--red);}
.history-card.status-success{border-left:3px solid var(--green);}

.card-header{
  display:flex;align-items:center;gap:14px;padding:14px 18px;
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.card-header:hover{background:var(--chiphov);}

.card-status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.status-success .card-status-dot{background:var(--green);}
.status-error   .card-status-dot{background:var(--red);}

.card-query{flex:1;font-family:'Syne',sans-serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.4;}
.card-ts{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--ink3);white-space:nowrap;flex-shrink:0;}
.card-rows{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--ink3);white-space:nowrap;flex-shrink:0;}

.card-chevron{color:var(--ink3);transition:transform .25s;flex-shrink:0;}
.history-card.open .card-chevron{transform:rotate(90deg);}

/* Expandable SQL body */
.card-body{
  display:none;
  border-top:1px solid var(--border);
  padding:16px 18px;
}
.history-card.open .card-body{display:block;}
.sql-label{font-family:'DM Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);margin-bottom:8px;}
.sql-pre{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px 16px;overflow-x:auto;}
.sql-pre code{font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;color:var(--ink);white-space:pre;}
.kw{color:var(--accent);font-weight:500;}
.fn{color:#7b93e8;}
.str{color:#4ade80;}
.num{color:#c084fc;}

.card-actions{display:flex;gap:8px;margin-top:12px;}
.btn-rerun{
  padding:8px 16px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  color:var(--bg);background:var(--accent);border:none;border-radius:5px;
  cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  transition:background .2s,transform .15s;
}
.btn-rerun:hover{background:var(--accentL);transform:translateY(-1px);}
.btn-copy{
  padding:8px 14px;font-family:'DM Mono',monospace;font-size:11px;
  color:var(--ink2);background:transparent;border:1.5px solid var(--border);border-radius:5px;
  cursor:pointer;transition:border-color .2s,color .2s;
}
.btn-copy:hover{border-color:var(--accent);color:var(--accent);}
.btn-copy.copied{border-color:var(--green);color:var(--green);}

/* Result table */
.result-label{font-family:'DM Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);margin:18px 0 8px;}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:6px;background:var(--surface);max-height:320px;overflow-y:auto;}
.table-wrap::-webkit-scrollbar{width:4px;height:4px;}
.table-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:2px solid var(--border);}
th{padding:9px 14px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);background:var(--ibg);white-space:nowrap;}
td{padding:9px 14px;font-family:'DM Mono',monospace;font-size:12px;color:var(--ink2);border-bottom:1px solid var(--border);white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--chiphov);}
td:first-child{font-weight:500;color:var(--ink);}
.no-data{padding:20px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;}
.empty-state{
  text-align:center;padding:80px 40px;
  display:none;flex-direction:column;align-items:center;gap:12px;
  animation:fadeIn .5s ease both;
}
.empty-state.visible{display:flex;}
.empty-icon{color:var(--ink3);opacity:.4;margin-bottom:6px;}
.empty-title{font-family:'Instrument Serif',serif;font-size:26px;font-weight:400;color:var(--ink3);}
.empty-sub{font-family:'DM Mono',monospace;font-size:11.5px;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;}

/* Loading spinner */
.loading-wrap{display:flex;justify-content:center;padding:60px 0;animation:fadeIn .3s ease both;}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}

/* Footer */
footer{position:fixed;bottom:0;left:0;right:0;z-index:99;border-top:1px solid var(--border);padding:11px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:background .3s,border-color .3s;animation:slideUp .5s ease .4s both;}
[data-theme="light"] footer{background:rgba(245,242,236,.9);}
footer p{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--ink3);}
footer p b{color:var(--ink2);font-weight:500;}

@media(max-width:640px){
  .topbar{padding:0 18px;height:50px;}
  .topbar-tag,.toggle-label{display:none;}
  .page-wrap{padding:32px 18px 100px;}
  .card-ts,.card-rows{display:none;}
  footer{padding:10px 18px;flex-direction:column;gap:4px;text-align:center;}
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <a href="/" class="wordmark">
      <div class="wm-dot"></div>
      <span class="wm-sq"><span class="wm-smart">Smart</span><span class="wm-query">Query</span></span>
    </a>
    <span class="topbar-tag">AdventureWorks</span>
  </div>
  <div class="topbar-right">
    <div class="db-pill"><div class="db-dot"></div><span>Connected</span></div>
    <a href="/" class="nav-link">← Back to App</a>
    <a href="/about" class="nav-link">About</a>
    <div class="theme-toggle" onclick="toggleTheme()" title="Switch theme">
      <span class="toggle-label" id="toggleLabel">Dark</span>
      <div class="toggle-track"><div class="toggle-knob"></div></div>
    </div>
  </div>
</header>

<!-- PAGE -->
<div class="page-wrap">

  <div class="page-header">
    <div class="page-eyebrow">Query Log</div>
    <h1 class="page-title">Search <em>History</em></h1>
    <div class="page-meta">
      <span class="meta-count" id="metaCount">Loading…</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="Search queries or SQL…" oninput="filterCards()" />
  </div>

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" data-filter="all"    onclick="setFilter('all',this)">All</button>
    <button class="filter-tab"        data-filter="success" onclick="setFilter('success',this)">Success</button>
    <button class="filter-tab"        data-filter="error"   onclick="setFilter('error',this)">Failed</button>
  </div>

  <!-- Content -->
  <div id="loadingWrap" class="loading-wrap"><div class="spinner"></div></div>

  <div class="history-list" id="historyList"></div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="26" stroke="currentColor" stroke-width="1.5" opacity=".4"/>
        <path d="M20 28h16M28 20v16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity=".3"/>
        <circle cx="28" cy="28" r="4" fill="currentColor" opacity=".2"/>
      </svg>
    </div>
    <div class="empty-title" id="emptyTitle">No history yet</div>
    <div class="empty-sub" id="emptySub">Run a query on the main page to see it here</div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>SmartQuery &nbsp;·&nbsp; <b>AdventureWorks 2016</b> dataset</p>
  <p>Powered by <b>SmartQuery</b> &nbsp;·&nbsp; Made by <b>Sonu Ray</b></p>
</footer>

<script>
/* ── Particles ── */
(function(){
  const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d');
  let W,H,particles=[],mouse={x:-999,y:-999};
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  window.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
  function rand(a,b){return Math.random()*(b-a)+a;}
  for(let i=0;i<35;i++) particles.push({x:rand(0,innerWidth),y:rand(0,innerHeight),vx:rand(-.25,.25),vy:rand(-.25,.25),r:rand(1,2.2),o:rand(.5,.9)});
  function ac(){return document.documentElement.getAttribute('data-theme')==='light'?'196,92,26':'224,123,58';}
  function draw(){
    ctx.clearRect(0,0,W,H); const c=ac();
    particles.forEach((p,i)=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      const dx=p.x-mouse.x,dy=p.y-mouse.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<90){p.x+=dx/d*1.2;p.y+=dy/d*1.2;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(${c},${p.o})`;ctx.fill();
      for(let j=i+1;j<particles.length;j++){const q=particles[j],dd=Math.sqrt((p.x-q.x)**2+(p.y-q.y)**2);if(dd<110){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle=`rgba(${c},${(1-dd/110)*.25})`;ctx.lineWidth=.8;ctx.stroke();}}
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Theme ── */
const html=document.documentElement,toggleLabel=document.getElementById('toggleLabel');
let activeTheme=localStorage.getItem('sq-theme')||'dark';
applyTheme(activeTheme);
function applyTheme(t){activeTheme=t;html.setAttribute('data-theme',t);localStorage.setItem('sq-theme',t);toggleLabel.textContent=t==='dark'?'Dark':'Light';}
function toggleTheme(){applyTheme(activeTheme==='dark'?'light':'dark');}

/* ── Render result table ── */
function renderTable(rows){
  if(!rows || rows.length === 0) return '';
  const cols = Object.keys(rows[0]);
  const thead = `<thead><tr>${cols.map(c=>`<th>${escHtml(c)}</th>`).join('')}</tr></thead>`;
  const tbody = `<tbody>${rows.map(row=>
    `<tr>${cols.map(c=>`<td>${row[c]!==null&&row[c]!==undefined?escHtml(String(row[c])):'—'}</td>`).join('')}</tr>`
  ).join('')}</tbody>`;
  return `<div class="result-label">Results &nbsp;·&nbsp; ${rows.length} row${rows.length!==1?'s':''}</div>
          <div class="table-wrap"><table>${thead}${tbody}</table></div>`;
}

/* ── SQL highlight ── */
function highlightSQL(sql){
  const kw=/\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|ON|GROUP\s+BY|ORDER\s+BY|HAVING|AS|AND|OR|NOT|IN|IS|NULL|DISTINCT|UNION|ALL|WITH|CASE|WHEN|THEN|ELSE|END|ASC|DESC|BY|TOP|EXISTS|BETWEEN)\b/gi;
  const fn=/\b(COUNT|SUM|AVG|MIN|MAX|ROUND|COALESCE|CAST|CONVERT|ISNULL|YEAR|MONTH|DAY|GETDATE|DATEDIFF)\b/gi;
  const str=/('(?:[^'\\]|\\.)*')/g;
  const num=/\b(\d+(?:\.\d+)?)\b/g;
  return sql.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(kw,m=>`<span class="kw">${m}</span>`)
    .replace(fn,m=>`<span class="fn">${m}</span>`)
    .replace(str,m=>`<span class="str">${m}</span>`)
    .replace(num,m=>`<span class="num">${m}</span>`);
}

/* ── State ── */
let allEntries = [];
let activeFilter = 'all';

/* ── Load history ── */
async function loadHistory(){
  try{
    const res = await fetch('/api/history');
    const data = await res.json();
    allEntries = data.entries || [];
    document.getElementById('loadingWrap').style.display='none';
    renderList();
  }catch(e){
    document.getElementById('loadingWrap').style.display='none';
    showEmpty('Could not load history','Make sure the backend is running');
  }
}

/* ── Render ── */
function renderList(){
  const search = document.getElementById('searchBox').value.toLowerCase();
  const filtered = allEntries.filter(e=>{
    if(activeFilter==='success' && e.status!=='success') return false;
    if(activeFilter==='error'   && e.status!=='error')   return false;
    if(search && !e.query.toLowerCase().includes(search) && !e.sql.toLowerCase().includes(search)) return false;
    return true;
  });

  const list = document.getElementById('historyList');
  list.innerHTML='';

  const total = allEntries.length;
  const success = allEntries.filter(e=>e.status==='success').length;
  document.getElementById('metaCount').innerHTML =
    `<b>${total}</b> total &nbsp;·&nbsp; <b>${success}</b> successful &nbsp;·&nbsp; <b>${total-success}</b> failed`;

  if(filtered.length===0){
    if(search||activeFilter!=='all') showEmpty('No results found','Try a different search or filter');
    else showEmpty('No history yet','Run a query on the main page to see it here');
    return;
  }
  document.getElementById('emptyState').classList.remove('visible');

  filtered.forEach((entry,i)=>{
    const card = document.createElement('div');
    card.className=`history-card status-${entry.status}`;
    card.style.animationDelay=(i*40)+'ms';

    const rowsText = entry.status==='success'
      ? `${entry.row_count} row${entry.row_count!==1?'s':''}`
      : 'Failed';

    const sqlBlock = entry.sql
      ? `<div class="sql-label">Generated SQL</div>
         <div class="sql-pre"><code>${highlightSQL(entry.sql)}</code></div>
         ${renderTable(entry.data)}
         <div class="card-actions">
           <a href="/" class="btn-rerun" onclick="rerun(event,'${entry.query.replace(/'/g,"\\'")}')">▶ Re-run Query</a>
           <button class="btn-copy" onclick="copySQL(this,'${entry.sql.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}')">Copy SQL</button>
         </div>`
      : `<div class="sql-label">No SQL generated for this entry.</div>`;

    card.innerHTML=`
      <div class="card-header" onclick="toggleCard(this)">
        <div class="card-status-dot"></div>
        <div class="card-query">${escHtml(entry.query)}</div>
        <div class="card-rows">${rowsText}</div>
        <div class="card-ts">${entry.timestamp}</div>
        <svg class="card-chevron" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="card-body">${sqlBlock}</div>`;

    list.appendChild(card);
  });
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleCard(header){
  const card = header.closest('.history-card');
  card.classList.toggle('open');
}

function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filterCards(){ renderList(); }

function showEmpty(title,sub){
  const el=document.getElementById('emptyState');
  document.getElementById('emptyTitle').textContent=title;
  document.getElementById('emptySub').textContent=sub;
  el.classList.add('visible');
  document.getElementById('historyList').innerHTML='';
}

function copySQL(btn,sql){
  navigator.clipboard.writeText(sql).then(()=>{
    btn.textContent='Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='Copy SQL'; btn.classList.remove('copied'); },2000);
  });
}

function rerun(e,query){
  e.preventDefault();
  localStorage.setItem('sq-rerun',query);
  window.location.href='/';
}

async function clearAll(){
  if(!confirm('Clear all history? This cannot be undone.')) return;
  await fetch('/api/history',{method:'DELETE'});
  allEntries=[];
  renderList();
}

/* ── Init ── */
loadHistory();

/* ── Handle re-run from index ── */
/* (index.html picks up sq-rerun from localStorage on load) */
</script>
